<!doctype html>
<html lang="en">
  <head>
    <script>
      // Early diagnostic & suppression system for sandboxed environments
      (function() {
        const suppressiveErrors = [
          'Script error.',
          'ResizeObserver loop',
          'Non-Error promise rejection',
          'WebSocket connection',
          'vite:hmr'
        ];

        function isBenign(msg) {
          if (!msg) return true;
          return suppressiveErrors.some(s => msg.includes(s));
        }

        window.addEventListener('error', (event) => {
          if (isBenign(event.message)) {
            event.stopImmediatePropagation();
            return;
          }
          console.error('[Aura DJ Diagnostic]:', event.error || event.message);
        }, true);

        window.addEventListener('unhandledrejection', (event) => {
          const msg = event.reason?.message || String(event.reason || '');
          if (isBenign(msg)) {
            event.preventDefault();
            event.stopImmediatePropagation();
            return;
          }
          
          if (msg.includes("API key not valid")) {
            console.error('[Aura DJ] 🚨 GEMINI API KEY INVALID: Please check your Secrets in AI Studio.');
            event.preventDefault();
            return;
          }

          console.error('[Aura DJ Promise Diagnostic]:', event.reason);
        }, true);
      })();
    </script>
    <meta charset="UTF-8" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
