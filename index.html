<!doctype html>
<html lang="en">
  <head>
    <script>
      // Early diagnostic & suppression system for sandboxed environments
      (function() {
        const suppressiveErrors = [
          'Script error.',
          'ResizeObserver loop',
          'Non-Error promise rejection',
          'WebSocket connection',
          'vite:hmr'
        ];

        function isBenign(msg) {
          if (!msg) return true;
          const lowerMsg = msg.toLowerCase();
          return suppressiveErrors.some(s => lowerMsg.includes(s.toLowerCase())) || 
                 lowerMsg.includes('vite') || 
                 lowerMsg.includes('hmr') ||
                 lowerMsg.includes('extension');
        }

        window.addEventListener('error', (event) => {
          if (isBenign(event.message)) {
            event.stopImmediatePropagation();
            return;
          }
          console.error('[Aura DJ Diagnostic]:', event.error || event.message);
        }, true);

        window.addEventListener('unhandledrejection', (event) => {
          const msg = event.reason?.message || String(event.reason || '');
          if (isBenign(msg)) {
            event.preventDefault();
            event.stopImmediatePropagation();
            return;
          }
          
          const lowerMsg = msg.toLowerCase();
          if (lowerMsg.includes("api key not valid") || lowerMsg.includes("gemini_api_key is not configured")) {
            console.error('[Aura DJ] 🚨 GEMINI API KEY ISSUE: Please check your Secrets in AI Studio.');
            event.preventDefault();
            event.stopImmediatePropagation();
            return;
          }

          if (lowerMsg.includes("could not reach cloud firestore backend") || lowerMsg.includes("unavailable")) {
            console.warn('[Aura DJ] 📡 Firestore is offline. Persistence may be limited.');
            event.preventDefault();
            event.stopImmediatePropagation();
            return;
          }

          console.error('[Aura DJ Promise Diagnostic]:', event.reason);
        }, true);
      })();
    </script>
    <meta charset="UTF-8" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
